---
-   name: add instances to hosts
    hosts: local
    gather_facts: False
    tasks:
        - include_vars: roles/provision_instances/vars/main.yml
        - include_tasks: roles/provision_instances/tasks/add_vms_as_hosts.yml

-   name: create security groups
    hosts: local
    gather_facts: False
    roles: 
        - security_groups

-   name: create networks
    hosts: local
    gather_facts: False
    tasks:
        -   include_tasks: roles/provision_instances/tasks/vnet.yml
    collections:
        - azure.azcollection

# Here we utilize that we added each instance to hosts.
-   hosts: devops
    connection: local # Keep ansible from open ssh connection
    gather_facts: False
    # no_log: True
    collections:
        - azure.azcollection
    roles:
        - provision_instances # This role creates the VMs, including loadbalancer-VM

-   name: Configure initial server setup and deploy user
    hosts: devops
    remote_user: azureuser # Connect initially as azureuser since 'deploy' isn't created yet
    become: yes
    become_method: sudo
    roles:
        - 10-first-minutes

-   hosts: loadbalancer
    remote_user: "deploy"
    become: yes
    become_method: sudo
    roles:
        -   deploy_lb

-   hosts: database
    remote_user: deploy
    become: yes
    become_method: sudo
    roles:
        -   database_setup

- hosts: appserver
  remote_user: deploy
  become: yes
  become_method: sudo
  serial: 1
  roles:
    - microblog_setup