---
- name: Update apt cache
  apt:
    update_cache: yes

# ----------------------------
# INSTALL NGINX
# ----------------------------
- name: Install nginx
  apt:
    name: nginx
    state: present

- name: Ensure nginx is running
  service:
    name: nginx
    state: started
    enabled: yes

# ----------------------------
# CLEAN DEFAULT SITE (IMPORTANT)
# ----------------------------
- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

# ----------------------------
# DEPLOY LOAD BALANCER CONFIG
# ----------------------------
- name: Deploy nginx config (HTTP only)
  template:
    src: load-balancer-http.conf.j2
    dest: /etc/nginx/sites-available/load-balancer.conf
  when: (enable_tls | default(false)) == false
  notify: Restart nginx

- name: Deploy nginx config (HTTPS)
  template:
    src: load-balancer-https.conf.j2
    dest: /etc/nginx/sites-available/load-balancer.conf
  when: (enable_tls | default(false)) == true
  notify: Restart nginx

- name: Enable nginx site
  file:
    src: /etc/nginx/sites-available/load-balancer.conf
    dest: /etc/nginx/sites-enabled/load-balancer.conf
    state: link
  notify: Restart nginx

# ----------------------------
# CERTBOT (OPTIONAL)
# ----------------------------
- name: Install snapd (required for certbot)
  apt:
    name: snapd
    state: present

- name: Install certbot via snap
  command: snap install --classic certbot
  args:
    creates: /snap/bin/certbot

- name: Symlink certbot
  file:
    src: /snap/bin/certbot
    dest: /usr/bin/certbot
    state: link

- name: Check if certificate exists
  stat:
    path: /etc/letsencrypt/live/{{ domain_name }}/cert.pem
  register: letsencrypt_cert

- name: Stop nginx for certbot (standalone mode)
  service:
    name: nginx
    state: stopped
  when: enable_tls | default(false)

- name: Generate SSL certificate
  command: >
    certbot certonly --standalone --noninteractive --agree-tos
    --email {{ admin_email }}
    -d {{ domain_name }} -d www.{{ domain_name }}
  when: enable_tls | default(false)

- name: Start nginx again
  service:
    name: nginx
    state: started

# ----------------------------
# FINAL VALIDATION
# ----------------------------
- name: Test nginx config
  command: nginx -t
  register: nginx_test
  changed_when: false

- name: Reload nginx
  service:
    name: nginx
    state: reloaded
  when: nginx_test.rc == 0