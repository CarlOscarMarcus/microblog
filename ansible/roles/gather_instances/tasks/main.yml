---
-   name: Get facts by tags
    azure_rm_virtualmachine_info:
        resource_group: "{{ resource_group }}"
    delegate_to: localhost
    register: az_facts



-   name: Display all variables/facts known for a host
    debug:
        var: az_facts



-   name: add instance to hosts
    add_host:
        name: "{{ item.name | regex_replace('-VM$', '') }}.{{ domain_name }}"
        groups:
        - "{{ item.name | regex_replace('-VM$', '') }}" 
        - "{{ item.tags.Type }}"
        - devops
        iname: "{{ item.name | regex_replace('-VM$', '') }}"
        itype: "{{ item.tags.Type }}"
        ansible_host: "{{ item.tags.PublicIP }}"
    with_items: "{{ az_facts.vms }}"
    when: item.tags.PublicIP is defined and item.power_state == "running"



-   name: Display all variables/facts known for a host
    debug:
        var: hostvars