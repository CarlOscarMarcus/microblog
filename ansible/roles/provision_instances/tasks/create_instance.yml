---
-   name: Create public IP address
    azure_rm_publicipaddress:
        resource_group: "{{ resource_group }}"
        allocation_method: Static
        name: "{{ iname }}-ip"
        tags: "{{ vmtags }}"
    delegate_to: localhost
    register: output_ip_address

- name: Create DNS record for each VM
  azure_rm_dnsrecordset:
    resource_group: "{{ resource_group }}"
    zone_name: "{{ domain_name }}"
    relative_name: "{{ iname }}"
    record_type: A
    time_to_live: 300
    records:
      - entry: "{{ output_ip_address.state.ip_address }}"
  delegate_to: localhost

- name: Set ansible_host to the public IP
  set_fact:
    ansible_host: "{{ output_ip_address.state.ip_address }}"

- name: Dump public IP for VM which will be created
  debug:
    msg: "The public IP for {{ iname }} is {{ output_ip_address.state.ip_address }}."

- name: Create virtual network interface card
  azure_rm_networkinterface:
    resource_group: "{{ resource_group }}"
    name: "{{ iname }}-NIC"
    virtual_network: "microblog-Vnet"
    subnet: "microblog-Subnet"
    ip_configurations:
      - name: ipconfig1
        public_ip_address_name: "{{ iname }}-ip"
    security_group: "{{ itype }}-sg"
    tags: "{{ vmtags }}"

- name: Ensure additional "A" records for loadbalancer (www, @)
  azure_rm_dnsrecordset:
    resource_group: "{{ resource_group }}"
    relative_name: "{{ relative_name.name }}"
    zone_name: "{{ domain_name }}"
    record_type: A
    state: present
    records:
      - entry: "{{ output_ip_address.state.ip_address }}"
  when: iname == 'loadbalancer'
  loop: "{{ relative_names }}"
  loop_control:
    loop_var: relative_name
  delegate_to: localhost

- name: Ensure "A" record for monitoring server
  azure_rm_dnsrecordset:
      resource_group: "{{ resource_group }}"
      relative_name: "{{ iname }}"
      zone_name: "{{ domain_name }}"
      record_type: A
      state: present
      records:
      - entry: "{{ output_ip_address.state.ip_address }}"
  when: itype == 'monitoring'
  delegate_to: localhost


- name: Create VM
  azure_rm_virtualmachine:
        resource_group: "{{ resource_group }}"
        name: "{{ iname }}-VM"
        admin_username: "{{ root_user }}"
        ssh_password_enabled: false
        ssh_public_keys:
            - path: "/home/{{ root_user }}/.ssh/authorized_keys"
              key_data: "{{ lookup('file', pub_ssh_key_location) }}"
        vm_size: Standard_B1s
        network_interfaces: "{{ iname }}-NIC"
        managed_disk_type: Standard_LRS
        os_disk_size_gb: 30
        image:
            offer: Debian-12
            publisher: Debian
            sku: 12
            version: latest
        tags:
            StudentId: "{{ vmtags.StudentId }}"
            Type: "{{ itype }}"
            PublicIP: "{{ output_ip_address.state.ip_address }}"

- name: Wait for SSH to become available
  wait_for:
    host: "{{ output_ip_address.state.ip_address }}"
    port: 22
    delay: 10
    timeout: 100
    state: started
  delegate_to: localhost