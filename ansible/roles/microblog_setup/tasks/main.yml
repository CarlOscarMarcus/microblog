---
# ----------------------------
# PULL APPLICATION IMAGE
# ----------------------------
- name: Pull Microblog image
  community.docker.docker_image:
    name: osay21/microblog
    tag: "{{ microblog_version }}"
    source: pull

# ----------------------------
# DEPLOY CONTAINER
# ----------------------------
- name: Deploy Microblog container
  community.docker.docker_container:
    name: microblog
    image: "osay21/microblog:{{ microblog_version }}"
    state: started
    restart_policy: always
    recreate: true
    stop_timeout: 30
    env:
      FLASK_APP: microblog
      FLASK_ENV: production
      APP_VERSION: "{{ microblog_version }}"
      DB_HOST: "database"
      DB_USER: root
      DB_PASSWORD: mypassword
      DB_NAME: mydb
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
    ports:
      - "8000:5000"

# ----------------------------
# HEALTH CHECK
# ----------------------------
- name: Wait for app
  uri:
    url: http://localhost:8000/version
    return_content: yes
  register: version_check
  retries: 10
  delay: 5
  until: version_check.status == 200

- name: Validate version
  fail:
    msg: "Expected {{ microblog_version }}, got {{ version_check.json.version }}"
  when: version_check.json.version != microblog_version

# ----------------------------
# CLEANUP OLD IMAGES
# ----------------------------
- name: Remove unused Docker images
  community.docker.docker_prune:
    images: true
