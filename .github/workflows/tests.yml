name: Tests
on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: make install-test
      - name: Run tests
        run: make test
        env:
          FLASK_APP: microblog.py
          FLASK_ENV: testing
          DATABASE_URL: sqlite:///test.db