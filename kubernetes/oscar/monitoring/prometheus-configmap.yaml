apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s

    scrape_configs:
      - job_name: 'node'
        static_configs:
          - targets: ['node-exporter:9100']
            labels:
              instance: node-exporter

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
            labels:
              instance: prometheus

      - job_name: 'flask'
        static_configs:
          - targets: ['microblog-service.default.svc.cluster.local:80']
            labels:
              instance: flask

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']

    rule_files:
      - "rules.yml"

  rules.yml: |
    groups:
      - name: flask_alerts
        rules:
          - alert: FlaskHighErrorRate
            expr: rate(flask_http_request_total{status=~"5.."}[1m]) > 0
            for: 10s
            labels:
              severity: critical
            annotations:
              summary: "5xx errors detected on Flask app"
              description: "Error rate: {{ $value }} req/s on {{ $labels.instance }}"

          - alert: Flask404Spike
            expr: rate(flask_http_request_total{status="404"}[5m]) > 0.05
            for: 30s
            labels:
              severity: warning
            annotations:
              summary: "404 spike detected"
              description: "404 rate: {{ $value }} req/s"

          - alert: FlaskAppDown
            expr: up{job="flask"} == 0
            for: 10s
            labels:
              severity: critical
            annotations:
              summary: "Flask app is down"
              description: "Instance {{ $labels.instance }} is not responding"

          - alert: MoreGetRequestsThan20
            expr: flask_http_request_total{method="GET",status="200"} > 20 and flask_http_request_total{method="GET",status="200"} < 25
            for: 10s
            labels:
              severity: info
            annotations:
              summary: "GET request count between 20 and 25"

  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 15m
      receiver: webhook_receiver
      routes:
        - match:
            severity: critical
          receiver: webhook_receiver
          repeat_interval: 5m

    receivers:
      - name: webhook_receiver
        webhook_configs:
          - url: 'https://webhook.site/92ce9309-315d-42d6-a98e-855d806b5e82'
            send_resolved: true
            http_config:
              tls_config:
                insecure_skip_verify: true